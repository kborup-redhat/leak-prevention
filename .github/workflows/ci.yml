name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: go test ./... -v -count=1 -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: golangci-lint
        run: golangci-lint run ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        run: gosec ./...

      - name: Run govulncheck
        run: govulncheck ./...

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Generate watchlist database
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3
          bash seed-watchlist.sh

      - name: Login to Quay
        run: podman login -u '${{ secrets.QUAY_USERNAME }}' -p '${{ secrets.QUAY_PASSWORD }}' quay.io

      - name: Build container image
        run: |
          podman build -t quay.io/kborup/leak-prevention:${{ steps.version.outputs.version }} .
          podman tag quay.io/kborup/leak-prevention:${{ steps.version.outputs.version }} quay.io/kborup/leak-prevention:latest

      - name: Push container image
        run: |
          podman push quay.io/kborup/leak-prevention:${{ steps.version.outputs.version }}
          podman push quay.io/kborup/leak-prevention:latest

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-linux-amd64 ./cmd/hook
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-linux-arm64 ./cmd/hook
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-darwin-amd64 ./cmd/hook
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-darwin-arm64 ./cmd/hook
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-windows-amd64.exe ./cmd/hook
          GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/leak-prevention-hook-windows-arm64.exe ./cmd/hook

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/* \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes
