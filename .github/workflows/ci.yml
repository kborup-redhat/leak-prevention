name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: go test ./... -v -count=1 -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: golangci-lint
        run: golangci-lint run ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        run: gosec ./...

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build server
        run: go build -o leak-prevention-server ./cmd/server

      - name: Build hook
        run: go build -o leak-prevention-hook ./cmd/hook
