name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: go test ./... -v -count=1 -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: golangci-lint
        run: golangci-lint run ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: quay.io/kborup/ai-toolbox-ci:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        run: gosec ./...

      - name: Run govulncheck
        run: govulncheck ./...

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Generate watchlist database
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3
          bash seed-watchlist.sh

      - name: Login to Quay
        run: podman login -u '${{ secrets.QUAY_USERNAME }}' -p '${{ secrets.QUAY_PASSWORD }}' quay.io

      - name: Build container image
        run: podman build -t quay.io/kborup/leak-prevention:latest .

      - name: Push container image
        run: podman push quay.io/kborup/leak-prevention:latest
